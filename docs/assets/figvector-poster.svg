      .sans { font-family: 'Avenir Next', 'Helvetica Neue', Helvetica, sans-serif; }
      .mono { font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; }
      .ink { fill: #243042; }
      .muted { fill: #66728E; }
      .tiny { font-size: 15px; letter-spacing: 0.14em; }
      .tag { font-size: 16px; letter-spacing: 0.18em; }
      .label { font-size: 18px; font-weight: 700; }
      .caption { font-size: 14px; letter-spacing: 0.08em; }
      .micro { font-size: 12px; letter-spacing: 0.12em; }
    </style>
