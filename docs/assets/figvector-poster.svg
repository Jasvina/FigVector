<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="paper" x1="112" y1="84" x2="1510" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCF5E7"/>
      <stop offset="0.54" stop-color="#F4F8F2"/>
      <stop offset="1" stop-color="#E7F1F8"/>
    </linearGradient>
    <radialGradient id="halo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1020 442) rotate(90) scale(350 420)">
      <stop stop-color="#7EC9A8" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#7EC9A8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amberHalo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(578 392) rotate(90) scale(174 220)">
      <stop stop-color="#E0B35A" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#E0B35A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFDF8"/>
      <stop offset="1" stop-color="#FBFBF7"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
