    </filter>
    <marker id="arrow" markerWidth="18" markerHeight="12" refX="16" refY="6" orient="auto">
      <path d="M0 0L18 6L0 12Z" fill="#2E3247"/>
    </marker>
    <style>
      .serif { font-family: Georgia, 'Times New Roman', serif; }
      .sans { font-family: Avenir, Helvetica, Arial, sans-serif; }
      .mono { font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; }
      .ink { fill: #2E3247; }
      .muted { fill: #65708C; }
      .tiny { font-size: 16px; letter-spacing: 0.12em; }
      .label { font-size: 18px; font-weight: 700; }
      .caption { font-size: 15px; letter-spacing: 0.06em; }
    </style>
  </defs>

  <rect width="1600" height="900" rx="42" fill="url(#paper)"/>
  <rect width="1600" height="900" rx="42" fill="url(#microgrid)"/>
  <rect width="1600" height="900" rx="42" fill="url(#glow)"/>

  <path d="M86 92H1514M86 810H1514M86 92V810M1514 92V810" stroke="#2E3247" stroke-opacity="0.18" stroke-width="2"/>
  <path d="M124 128H1476V774H124V128Z" stroke="#2E3247" stroke-opacity="0.10" stroke-width="1.5" stroke-dasharray="8 12"/>

  <text x="118" y="86" class="mono tiny muted">OPEN-SOURCE SCIENTIFIC FIGURE RECONSTRUCTION · FIGVECTOR FIELD POSTER 001</text>
  <text x="1210" y="86" class="mono tiny muted">PNG → SCENE GRAPH → SVG / DRAW.IO</text>

  <text x="118" y="188" class="serif ink" font-size="96" font-weight="700">FigVector</text>
  <text x="124" y="232" class="sans muted" font-size="25">Turn scientific PNG diagrams into editable vector systems.</text>
  <text x="124" y="266" class="sans muted" font-size="21">科研示意图 → 语义图元 → 可编辑矢量图</text>

