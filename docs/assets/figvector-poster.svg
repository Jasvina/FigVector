<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCF6E8"/>
      <stop offset="0.55" stop-color="#F3F7F1"/>
      <stop offset="1" stop-color="#E8F2F8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1020 430) rotate(90) scale(360 500)">
      <stop stop-color="#9FE0C5" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#9FE0C5" stop-opacity="0"/>
    </radialGradient>
    <pattern id="microgrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#2E3247" stroke-opacity="0.045" stroke-width="1"/>
      <circle cx="0" cy="0" r="1.3" fill="#2E3247" fill-opacity="0.08"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
